{% extends 'base.html' %}
{% block header %}
{% endblock %}

{% block content %}

<div class="d-flex justify-content-center align-items-center mt-5">
    
    <div class="card shadow-lg border-0 rounded-4" style="max-width: 420px; width: 100%; background-color: #1e1e24;">
        <div class="card-body p-5 text-white text-center">
            
            <div class="bg-primary rounded-circle d-inline-flex justify-content-center align-items-center mb-4" style="width: 70px; height: 70px;">
                <i class="fa-solid fa-wallet fs-2 text-white"></i>
            </div>
            <h3 class="fw-bold mb-2">Olá, bem-vindo! 👋</h3>
            <p class="text-secondary mb-4">Faça login para gerenciar suas finanças.</p>

            <form method="post" class="login-form">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2 rounded-pill fw-bold">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Entrar
                </button>
            </form>
            
            <div class="mt-4">
                <small class="text-secondary">Ainda não tem uma conta? 
                    <a href="{% url 'registro' %}" class="text-primary text-decoration-none fw-bold">Cadastre-se</a>
                </small>
            </div>

        </div>
    </div>
</div>

<style>
    /* Alinha o texto das labels para a esquerda */
    .login-form p {
        margin-bottom: 1.2rem;
        text-align: left;
    }
    
    /* Estiliza os textos (Usuário e Senha) */
    .login-form label {
        font-weight: 500;
        margin-bottom: 0.5rem;
        display: block;
        color: #adb5bd; /* Tom de cinza claro do Bootstrap */
    }
    
    /* Estiliza as caixas de texto */
    .login-form input {
        width: 100%;
        padding: 0.8rem 1.2rem;
        border-radius: 0.5rem;
        border: 1px solid #495057;
        background-color: #2b2b36;
        color: #ffffff;
        transition: all 0.2s ease-in-out;
    }
    
    /* Efeito de brilho azul quando o usuário clica para digitar */
    .login-form input:focus {
        border-color: #0d6efd;
        outline: none;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
    }

    /* Esconde os textos de ajuda padrão do Django para manter o visual limpo */
    .helptext {
        display: none;
    }
</style>

{% endblock %}
