{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Finance Manager</title>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="{% static 'financas/css/style.css' %}">
</head>

<body class="p-3 bg-dark text-white"> 

    {% block header %}
    <div class="d-flex justify-content-end align-items-center position-relative py-2">
        
        <h1 class="m-0 position-absolute top-50 start-50 translate-middle">Controle Financeiro</h1>
        
        {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>Sair
                </button>
            </form>
        {% endif %}
    </div>

    <hr>
    {% endblock %}
    {% block content %}
    {% endblock %}

</body>
</html>
